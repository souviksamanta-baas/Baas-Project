name: Phase 0 CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_migrations:
        description: Deploy Supabase migrations to the linked project
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI verification
        run: npm run ci:verify

  supabase-migrations:
    name: Supabase Migration Validation
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate migration files
        run: npm run validate:migrations

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.102.0

      - name: Dry-run remote migration push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          : "${SUPABASE_ACCESS_TOKEN:?Missing SUPABASE_ACCESS_TOKEN secret}"
          : "${SUPABASE_DB_PASSWORD:?Missing SUPABASE_DB_PASSWORD secret}"
          : "${SUPABASE_PROJECT_REF:?Missing SUPABASE_PROJECT_REF repository variable}"
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --dry-run

      - name: Deploy remote migrations
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_migrations == true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          : "${SUPABASE_ACCESS_TOKEN:?Missing SUPABASE_ACCESS_TOKEN secret}"
          : "${SUPABASE_DB_PASSWORD:?Missing SUPABASE_DB_PASSWORD secret}"
          : "${SUPABASE_PROJECT_REF:?Missing SUPABASE_PROJECT_REF repository variable}"
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
