# Supabase local development configuration for BaaS.
#
# This file is intentionally minimal for Phase 0. The local stack can be
# started with `supabase start` and reset with `supabase db reset`.

project_id = "baas-mvp"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:8081"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.sms]
enable_signup = true
enable_confirmations = false
template = "El código para ingresar a nexolia es {{ .Code }}"
max_frequency = "60s"

[storage]
enabled = true

[edge_runtime]
enabled = true
